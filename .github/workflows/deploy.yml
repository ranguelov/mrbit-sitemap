name: Deploy to Cloudflare Workers
on:
  push:
      branches: [main]
        workflow_dispatch:
        jobs:
          deploy:
              runs-on: ubuntu-latest
                  name: Deploy
                      steps:
                            - uses: actions/checkout@v4
                                  - name: Deploy to Cloudflare Workers
                                          uses: cloudflare/wrangler-action@v3
                                                  with:
                                                            apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                                                                      accountId: 6abc67170208ca50ab66f2e08c1e07b3
                                                                      
